<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexión — Notas</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #f8fafc;
        color: #1e293b;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 1.5rem;
      }
      .card {
        background: #fff;
        border-radius: 1.5rem;
        box-shadow: 0 4px 24px rgba(0,0,0,.06);
        padding: 2.5rem 2rem;
        max-width: 360px;
        width: 100%;
        text-align: center;
      }
      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 1.25rem;
        background: #101827;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 48px;
        height: 48px;
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 700;
        margin-bottom: .5rem;
        color: #0f172a;
      }
      p {
        font-size: .875rem;
        line-height: 1.5;
        color: #64748b;
        margin-bottom: 1.5rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: .5rem;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: .75rem;
        padding: .75rem 1.5rem;
        font-size: .875rem;
        font-weight: 600;
        cursor: pointer;
        transition: background .15s;
      }
      .btn:hover { background: #1d4ed8; }
      .btn:active { background: #1e40af; }
      .meta { margin-top: 1.5rem; font-size: .75rem; color: #94a3b8; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
          <rect width="192" height="192" rx="44" fill="#101827"/>
          <path d="M54 48h84a16 16 0 0 1 16 16v80a16 16 0 0 1-16 16H54a16 16 0 0 1-16-16V64a16 16 0 0 1 16-16Z" fill="#f8fafc"/>
          <path d="M66 76h60M66 100h46M66 124h34" stroke="#2563eb" stroke-width="10" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Sin conexión</h1>
      <p>No tenés internet en este momento.<br />Las notas guardadas siguen visibles cuando vuelvas a conectarte.</p>
      <button class="btn" onclick="window.location.reload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
        Reintentar
      </button>
      <div class="meta">Notas — App offline</div>
    </div>
  </body>
</html>
